<div class="flex min-h-screen">
  <div class="w-full lg:w-1/2 flex items-center justify-center p-12 animate-slide-in-left">
    <div class="w-full max-w-md">
      <a routerLink="/" class="inline-flex items-center gap-2 mb-8 cursor-pointer">
        <svg viewBox="0 0 24 24" fill="none" class="w-8 h-8 text-[#075955]">
          <path d="M12 2L2 7l10 5 10-5-10-5z" fill="currentColor"/>
          <path d="M2 17l10 5 10-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M2 12l10 5 10-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="text-xl font-bold text-[#075955] tracking-tight">StudyHub</span>
      </a>

      <h2 class="text-3xl font-bold text-gray-900 animate-fade-in-up">¿Olvidaste tu contraseña?</h2>
      <p class="text-gray-500 mt-2 mb-8 animate-fade-in-up animate-delay-100">Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>

      @if (error) {
        <div class="animate-fade-in-up mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">{{ error }}</div>
      }
      @if (success) {
        <div class="animate-fade-in-up mb-4 p-3 rounded-lg bg-green-50 border border-green-200 text-green-700 text-sm">{{ success }}</div>
      }

      <form class="space-y-5" (ngSubmit)="submit()">
        <div class="animate-fade-in-up animate-delay-200">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Correo electrónico</label>
          <input
            id="email"
            type="email"
            placeholder="tu@correo.com"
            [(ngModel)]="email"
            name="email"
            required
            class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm outline-none transition-all duration-300 focus:border-[#00a699] focus:ring-1 focus:ring-[#00a699]"
          />
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="w-full bg-[#075955] text-white font-medium px-6 py-3 rounded-md transition-all duration-300 hover:bg-[#fbb253] hover:text-[#075955] hover:-translate-y-0.5 animate-fade-in-up animate-delay-400 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ loading ? 'Enviando…' : 'Enviar enlace' }}
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6 animate-fade-in-up animate-delay-500">
        <a routerLink="/login" class="text-[#00a699] font-medium hover:text-[#075955] transition-colors duration-300">Volver a iniciar sesión</a>
      </p>
    </div>
  </div>

  <div class="hidden lg:flex w-1/2 relative overflow-hidden bg-gradient-to-br from-[#075955] to-[#00a699] items-center justify-center animate-slide-in-right">
    <div class="absolute inset-0" style="background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px); background-size: 24px 24px;"></div>

    <div class="absolute top-12 right-12 w-24 h-24 rounded-full bg-white/5 animate-float"></div>
    <div class="absolute bottom-16 left-16 w-16 h-16 rounded-full bg-white/5 animate-float" style="animation-delay: 1s;"></div>
    <div class="absolute top-1/3 left-20 w-8 h-8 rounded-full bg-white/5 animate-float" style="animation-delay: 2s;"></div>

    <div class="relative z-10 text-center px-8">
      <h1 class="text-5xl font-extrabold text-white animate-fade-in-up">¿Bloqueado?</h1>
      <p class="text-xl text-white/80 leading-relaxed max-w-sm mt-4 mx-auto animate-fade-in-up animate-delay-200">
        No te preocupes. Te enviaremos un enlace para que puedas acceder de nuevo a tu cuenta.
      </p>
    </div>
  </div>
</div>
