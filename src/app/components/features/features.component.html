<section class="bg-white py-24">
  <div class="max-w-7xl mx-auto px-8">
    <h2 class="text-center mb-12">
      <span class="text-3xl font-bold text-[#075955]">Diseñado para estudiantes que quieren</span><br/>
      <span class="text-3xl font-bold text-[#00a699]">más que un calendario</span>
    </h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      @for (f of features; track f.title) {
        <div class="bg-white border border-gray-100 rounded-xl shadow-sm p-8 hover:shadow-md transition-shadow">
          <div class="w-10 h-10 rounded-lg bg-[#e0f2f1] flex items-center justify-center">
            <ng-icon [name]="f.icon" size="20" color="#00a699" />
          </div>
          <h3 class="font-bold text-[#075955] mt-4 mb-2">{{ f.title }}</h3>
          <p class="text-sm text-gray-500 leading-relaxed">{{ f.desc }}</p>
        </div>
      }
    </div>
  </div>
</section>
