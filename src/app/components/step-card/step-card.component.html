<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 flex items-start gap-5 transition-all hover:shadow-md cursor-pointer" (click)="toggle.emit()">
  @if (step.completed) {
    <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5" style="background: #1E9F68;">
      <ng-icon name="lucideCheck" size="18" class="text-white" />
    </div>
  } @else {
    <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 mt-0.5"
      style="background: white; border: 2px solid #d1d5db; color: #6b7280;">
      {{ step.order || index + 1 }}
    </div>
  }

  <div class="flex-1 min-w-0">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h3 class="text-lg font-bold text-gray-900">{{ step.title }}</h3>
        @if (step.description) {
          <p class="text-sm text-gray-500 mt-1.5 leading-relaxed">{{ step.description }}</p>
        }
      </div>
      @if (step.estimatedHours) {
        <div class="flex items-center gap-1 text-sm font-semibold text-gray-500 bg-gray-50 px-3 py-1 rounded-md whitespace-nowrap flex-shrink-0">
          <ng-icon name="lucideClock" size="14" />
          {{ step.estimatedHours }}h
        </div>
      }
    </div>

    @if (step.skill) {
      <div class="flex items-center gap-2 mt-3">
        <span class="text-xs font-semibold px-2.5 py-1 rounded-md inline-flex items-center gap-1" style="background: #f0fdfa; color: #0C5A60;">
          {{ step.skill }}
          <ng-icon name="lucideExternalLink" size="12" />
        </span>
        @if (step.skillCategory) {
          <span class="text-xs text-gray-400">{{ step.skillCategory }}</span>
        }
      </div>
    }
  </div>
</div>
