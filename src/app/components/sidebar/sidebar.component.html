<aside class="w-[260px] flex flex-col flex-shrink-0" style="background: #021C22;">
  <div class="p-6">
    <a routerLink="/dashboard" class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-full flex items-center justify-center bg-[#F4B960]">
        <svg viewBox="0 0 24 24" fill="none" stroke="#021C22" stroke-width="2.5" class="w-5 h-5">
          <path d="M4 11.333L12 4l8 7.333V20a1.333 1.333 0 0 1-1.333 1.333H5.333A1.333 1.333 0 0 1 4 20v-8.667z"/>
        </svg>
      </div>
      <span class="text-white text-lg font-bold tracking-tight">StudyHub</span>
    </a>
  </div>

  <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
    <!-- Dashboard -->
    <a routerLink="/dashboard"
      class="flex items-center gap-3 px-4 py-2.5 rounded-full text-sm font-semibold transition-colors"
      [class]="activeRoute === 'dashboard' ? 'bg-[#F4B960] text-[#021C22]' : 'text-gray-300 hover:text-white'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 shrink-0">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Dashboard
    </a>

    <!-- Materias -->
    <a routerLink="/subjects"
      class="flex items-center gap-3 px-4 py-2.5 rounded-full text-sm font-semibold transition-colors"
      [class]="activeRoute === 'subjects' ? 'bg-[#F4B960] text-[#021C22]' : 'text-gray-300 hover:text-white'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 shrink-0">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      Materias
    </a>

    <!-- Profesor IA -->
    <a routerLink="/profesor-ia"
      class="flex items-center gap-3 px-4 py-2.5 rounded-full text-sm font-semibold transition-colors"
      [class]="activeRoute === 'profesor-ia' ? 'bg-[#F4B960] text-[#021C22]' : 'text-gray-300 hover:text-white'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 shrink-0">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      Profesor IA
    </a>

    <!-- Mi CV -->
    <a routerLink="/mi-cv"
      class="flex items-center gap-3 px-4 py-2.5 rounded-full text-sm font-semibold transition-colors"
      [class]="activeRoute === 'mi-cv' ? 'bg-[#F4B960] text-[#021C22]' : 'text-gray-300 hover:text-white'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 shrink-0">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      Mi CV
    </a>

    <!-- Roadmaps -->
    <a routerLink="/roadmaps"
      class="flex items-center gap-3 px-4 py-2.5 rounded-full text-sm font-semibold transition-colors"
      [class]="activeRoute === 'roadmaps' ? 'bg-[#F4B960] text-[#021C22]' : 'text-gray-300 hover:text-white'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 shrink-0">
        <path d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
      Roadmaps
    </a>

    <!-- Grupos -->
    <a routerLink="/grupos"
      class="flex items-center gap-3 px-4 py-2.5 rounded-full text-sm font-semibold transition-colors"
      [class]="activeRoute === 'grupos' ? 'bg-[#F4B960] text-[#021C22]' : 'text-gray-300 hover:text-white'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 shrink-0">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Grupos
    </a>

    <!-- Riesgo académico -->
    <a routerLink="/riesgo"
      class="flex items-center gap-3 px-4 py-2.5 rounded-full text-sm font-semibold transition-colors"
      [class]="activeRoute === 'riesgo' ? 'bg-[#F4B960] text-[#021C22]' : 'text-gray-300 hover:text-white'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 shrink-0">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      Riesgo académico
    </a>

    <!-- Perfil -->
    <a routerLink="/perfil"
      class="flex items-center gap-3 px-4 py-2.5 rounded-full text-sm font-semibold transition-colors"
      [class]="activeRoute === 'perfil' ? 'bg-[#F4B960] text-[#021C22]' : 'text-gray-300 hover:text-white'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 shrink-0">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      Perfil
    </a>

    <!-- Notificaciones -->
    <a routerLink="/notificaciones"
      class="flex items-center gap-3 px-4 py-2.5 rounded-full text-sm font-semibold transition-colors"
      [class]="activeRoute === 'notificaciones' ? 'bg-[#F4B960] text-[#021C22]' : 'text-gray-300 hover:text-white'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 shrink-0">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      Notificaciones
      @if (notifService.unreadCount() > 0) {
        <span class="ml-auto text-xs font-bold" [class]="activeRoute === 'notificaciones' ? 'text-[#021C22]' : 'text-[#F4B960]'">
          {{ notifService.unreadCount() }}
        </span>
      }
    </a>
  </nav>

  <div class="p-5 border-t border-white/5 bg-[#021A20]">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm shrink-0" style="background: #F4B960; color: #021C22;">
        {{ getInitial() }}
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-white text-sm font-bold truncate">{{ fullName }}</p>
        <p class="text-gray-400 text-xs truncate">Nivel {{ level }} &middot; {{ xp }} XP</p>
      </div>
      <button (click)="auth.logout()" class="text-gray-400 hover:text-white transition-colors shrink-0 cursor-pointer" title="Cerrar sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
      </button>
    </div>
  </div>
</aside>
